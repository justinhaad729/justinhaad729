<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f11;
    --bg2:      #18181c;
    --bg3:      #222228;
    --border:   #2e2e38;
    --border2:  #3e3e4e;
    --text:     #e8e8f0;
    --muted:    #7a7a90;
    --accent:   #7c6dfa;
    --accent2:  #a996ff;
    --green:    #34d89b;
    --amber:    #f5a623;
    --red:      #f05e5e;
    --font:     'DM Sans', sans-serif;
    --mono:     'DM Mono', monospace;
    --radius:   10px;
    --radius-lg:16px;
  }

  html { font-family: var(--font); font-size: 15px; background: var(--bg); color: var(--text); }
  body { min-height: 100vh; }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .auth-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
  }
  .auth-card h1 {
    font-size: 1.5rem;
    font-weight: 500;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .auth-card p { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.75rem; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .auth-tab {
    flex: 1; text-align: center; padding: 0.6rem 0; cursor: pointer;
    font-size: 0.875rem; color: var(--muted); border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: color 0.15s, border-color 0.15s;
  }
  .auth-tab.active { color: var(--accent2); border-color: var(--accent); }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 0.6rem 0.8rem;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 0.9rem;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 0.7rem; background: var(--accent);
    border: none; border-radius: var(--radius); color: #fff;
    font-family: var(--font); font-size: 0.9rem; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .auth-msg { margin-top: 0.75rem; font-size: 0.8rem; text-align: center; min-height: 1.2em; }
  .auth-msg.error { color: var(--red); }
  .auth-msg.success { color: var(--green); }

  /* ── APP SHELL ── */
  #app-screen { display: none; min-height: 100vh; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,17,0.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }
  .logo { font-size: 1rem; font-weight: 500; letter-spacing: -0.02em; }
  .logo span { color: var(--accent2); }
  .user-row { display: flex; align-items: center; gap: 10px; }
  .user-email { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-ghost {
    padding: 0.35rem 0.75rem; background: transparent;
    border: 1px solid var(--border2); border-radius: var(--radius);
    color: var(--muted); font-family: var(--font); font-size: 0.78rem;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  main { max-width: 780px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }

  /* ── STATS ── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0.85rem 1rem;
  }
  .stat .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat .val { font-size: 1.5rem; font-weight: 500; font-family: var(--mono); color: var(--text); }
  .stat .val.accent { color: var(--accent2); }
  .stat .val.green  { color: var(--green); }
  .stat .val.amber  { color: var(--amber); }

  /* ── TOOLBAR ── */
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .toolbar input {
    flex: 1; min-width: 160px; height: 36px; padding: 0 12px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 0.875rem; outline: none;
    transition: border-color 0.15s;
  }
  .toolbar input:focus { border-color: var(--accent); }
  .tbtn {
    height: 36px; padding: 0 13px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--muted); font-family: var(--font); font-size: 0.82rem;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .tbtn:hover { border-color: var(--border2); color: var(--text); }
  .tbtn.on { border-color: var(--accent); color: var(--accent2); background: rgba(124,109,250,0.08); }
  .tbtn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── CARDS ── */
  #card-list { display: flex; flex-direction: column; gap: 8px; }

  .fc {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.1rem 1.2rem;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .fc:hover { border-color: var(--border2); background: var(--bg3); }
  .fc.revealed { border-color: rgba(124,109,250,0.35); }

  .fc-top { display: flex; gap: 10px; align-items: flex-start; }
  .fc-num { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); min-width: 28px; padding-top: 2px; }
  .fc-q { font-size: 0.9rem; color: var(--text); line-height: 1.65; flex: 1; }
  .star-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 2px; flex-shrink: 0;
    transition: color 0.15s; line-height: 1;
  }
  .star-btn:hover { color: var(--amber); }
  .star-btn.on { color: var(--amber); }
  .star-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .star-btn.on svg { fill: var(--amber); }

  .fc-ans {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 10px;
  }
  .ans-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding-top: 2px; white-space: nowrap; }
  .ans-text {
    font-size: 0.9rem; font-weight: 500; color: var(--accent2); flex: 1;
    filter: blur(7px); user-select: none; transition: filter 0.25s;
  }
  .fc.revealed .ans-text { filter: none; user-select: text; }
  .tap-hint { font-size: 0.72rem; color: var(--muted); white-space: nowrap; padding-top: 2px; }
  .fc.revealed .tap-hint { display: none; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.875rem; }

  /* ── SYNC BADGE ── */
  #sync-status {
    position: fixed; bottom: 1.25rem; right: 1.25rem;
    font-size: 0.75rem; font-family: var(--mono);
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 999px; padding: 0.35rem 0.85rem;
    color: var(--muted); opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  #sync-status.show { opacity: 1; }
  #sync-status.ok   { color: var(--green); border-color: rgba(52,216,155,0.3); }
  #sync-status.err  { color: var(--red);   border-color: rgba(240,94,94,0.3); }

  @media (max-width: 520px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    header { padding: 0.75rem 1rem; }
    .user-email { display: none; }
  }
</style>
</head>

/* ── SUPABASE INIT ── */
async function initSupabase() {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    userId = session.user.id;
    showApp(session.user.email);
    await loadStars();
  }
  supabase.auth.onAuthStateChange((_e, session) => {
    if (session) {
      userId = session.user.id;
      showApp(session.user.email);
      loadStars();
    } else {
      userId = null;
      showAuth();
    }
  });
}

/* ── AUTH ── */
function switchTab(t) {
  currentTab = t;
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-signup').classList.toggle('active', t==='signup');
  document.getElementById('auth-btn').textContent = t==='login' ? 'Sign in' : 'Create account';
  setMsg('','');
}

function setMsg(text, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'auth-msg' + (type ? ' '+type : '');
}

async function doAuth() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn      = document.getElementById('auth-btn');
  if (!email || !password) { setMsg('Please fill in both fields.','error'); return; }
  btn.disabled = true;
  btn.textContent = 'Please wait…';
  let error;
  if (currentTab === 'login') {
    ({ error } = await supabase.auth.signInWithPassword({ email, password }));
  } else {
    ({ error } = await supabase.auth.signUp({ email, password }));
    if (!error) { setMsg('Account created! Check your email to confirm, then sign in.','success'); btn.disabled=false; btn.textContent='Create account'; return; }
  }
  btn.disabled = false;
  btn.textContent = currentTab==='login' ? 'Sign in' : 'Create account';
  if (error) setMsg(error.message, 'error');
}

async function signOut() {
  await supabase.auth.signOut();
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display  = 'none';
}
function showApp(email) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display  = 'block';
  document.getElementById('user-email-lbl').textContent = email;
  render();
}

/* ── SUPABASE SYNC ── */
async function loadStars() {
  const { data, error } = await supabase
    .from('stars')
    .select('question_id')
    .eq('user_id', userId);
  if (error) { console.error(error); return; }
  const ids = new Set(data.map(r => r.question_id));
  cards.forEach(c => c.starred = ids.has(c.id));
  render();
}

function flashSync(state) {
  const el = document.getElementById('sync-status');
  el.textContent = state === 'ok' ? '✓ synced' : '⚠ sync error';
  el.className = 'show ' + state;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=> el.className = '', 2000);
}

async function saveStar(card) {
  if (card.starred) {
    const { error } = await supabase.from('stars').upsert({ user_id: userId, question_id: card.id }, { onConflict: 'user_id,question_id' });
    flashSync(error ? 'err' : 'ok');
  } else {
    const { error } = await supabase.from('stars').delete().eq('user_id', userId).eq('question_id', card.id);
    flashSync(error ? 'err' : 'ok');
  }
}

/* ── CONTROLS ── */
function toggleRevealAll() {
  allRevealed = !allRevealed;
  cards.forEach(c => c.revealed = allRevealed);
  const btn = document.getElementById('reveal-btn');
  btn.classList.toggle('on', allRevealed);
  btn.innerHTML = allRevealed
    ? `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg> Hide all`
    : `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Reveal all`;
  render();
}

function toggleStarFilter() {
  starFilter = !starFilter;
  document.getElementById('star-btn').classList.toggle('on', starFilter);
  render();
}

function shuffle() {
  for (let i = cards.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [cards[i],cards[j]] = [cards[j],cards[i]];
  }
  render();
}

function toggleCard(id) {
  const c = cards.find(x=>x.id===id);
  if (c) c.revealed = !c.revealed;
  render();
}

function toggleStar(id, e) {
  e.stopPropagation();
  const c = cards.find(x=>x.id===id);
  if (!c) return;
  c.starred = !c.starred;
  saveStar(c);
  render();
}

/* ── RENDER ── */
function render() {
  const q = (document.getElementById('search')||{value:''}).value.toLowerCase();
  const visible = cards.filter(c => {
    const matchQ = !q || c.q.toLowerCase().includes(q) || c.a.toLowerCase().includes(q);
    const matchS = !starFilter || c.starred;
    return matchQ && matchS;
  });

  document.getElementById('s-total').textContent   = cards.length;
  document.getElementById('s-showing').textContent = visible.length;
  document.getElementById('s-revealed').textContent= cards.filter(c=>c.revealed).length;
  document.getElementById('s-starred').textContent = cards.filter(c=>c.starred).length;

  const list = document.getElementById('card-list');
  if (!list) return;

  if (!visible.length) {
    list.innerHTML = '<div class="empty">No matching questions found.</div>';
    return;
  }

  const starIconOff = `<svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  const starIconOn  = `<svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:var(--amber);fill:var(--amber);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;

  list.innerHTML = visible.map((c,i) => `
    <div class="fc${c.revealed?' revealed':''}" onclick="toggleCard(${c.id})">
      <div class="fc-top">
        <span class="fc-num">${String(i+1).padStart(2,'0')}</span>
        <span class="fc-q">${c.q}</span>
        <button class="star-btn${c.starred?' on':''}" onclick="toggleStar(${c.id},event)" aria-label="${c.starred?'Unstar':'Star'}">
          ${c.starred ? starIconOn : starIconOff}
        </button>
      </div>
      <div class="fc-ans">
        <span class="ans-lbl">Answer</span>
        <span class="ans-text">${c.a}</span>
        <span class="tap-hint">tap to reveal</span>
      </div>
    </div>
  `).join('');
}

/* ── BOOT ── */
initSupabase();
</script>
</body>
</html>
