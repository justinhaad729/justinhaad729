<html lang="en">

<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0d0d10; --bg2:#17171c; --bg3:#1f1f26; --bg4:#27272f;
  --border:#2a2a35; --border2:#3a3a48;
  --text:#eeeef5; --muted:#6e6e88;
  --accent:#7c6dfa; --accent2:#a996ff; --accentbg:rgba(124,109,250,0.10);
  --green:#2dd4a0; --amber:#f5a623; --red:#f06060;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:12px; --r-lg:18px;
  --nav-h:64px; --safe-b:env(safe-area-inset-bottom,0px);
}
html { font-family:var(--font); background:var(--bg); color:var(--text); font-size:16px; height:100%; }
body { min-height:100%; overscroll-behavior:none; }

/* SYNC BANNER */
#sync-banner {
  position:fixed; top:0; left:0; right:0; z-index:999;
  background:var(--bg3); border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  transform:translateY(-100%); transition:transform .3s ease;
}
#sync-banner.show { transform:translateY(0); }
#sync-banner p { font-size:0.82rem; color:var(--text); flex:1; }
#sync-banner p span { color:var(--accent2); font-family:var(--mono); font-size:0.75rem; word-break:break-all; }
.banner-close { background:none; border:1px solid var(--border2); border-radius:var(--r); color:var(--muted); font-family:var(--font); font-size:0.75rem; padding:4px 10px; cursor:pointer; white-space:nowrap; touch-action:manipulation; }

/* HEADER */
.app-header {
  position:sticky; top:0; z-index:200;
  background:rgba(13,13,16,0.92); backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  height:56px; padding:0 1.25rem;
  padding-top:env(safe-area-inset-top,0px);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.header-logo { font-size:1.1rem; font-weight:700; letter-spacing:-0.02em; }
.header-logo span { color:var(--accent2); }
.header-right { display:flex; align-items:center; gap:8px; }
.header-count { font-size:0.72rem; color:var(--muted); font-family:var(--mono); background:var(--bg3); border:1px solid var(--border); border-radius:999px; padding:3px 10px; white-space:nowrap; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background .3s; }
.sync-dot.ok  { background:var(--green); }
.sync-dot.err { background:var(--red); }
.sync-dot.busy { background:var(--amber); animation:pulse .8s infinite alternate; }
@keyframes pulse { from{opacity:1} to{opacity:0.3} }

/* BODY */
.app-body { overflow-y:auto; padding:1.25rem 1rem calc(var(--nav-h) + var(--safe-b) + 1rem); -webkit-overflow-scrolling:touch; }

/* STATS */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:1.1rem; }
.stat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:0.7rem 0.75rem; }
.stat .lbl { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:3px; }
.stat .val { font-size:1.35rem; font-weight:600; font-family:var(--mono); line-height:1; color:var(--text); }
.stat .val.ca { color:var(--accent2); }
.stat .val.cg { color:var(--green); }
.stat .val.co { color:var(--amber); }

/* SEARCH */
.search-wrap { position:relative; margin-bottom:0.85rem; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; stroke:var(--muted); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; pointer-events:none; }
#search { width:100%; height:44px; padding:0 12px 0 38px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:var(--font); font-size:0.9rem; outline:none; -webkit-appearance:none; }
#search:focus { border-color:var(--accent); }
#search::placeholder { color:var(--muted); }

/* ACTION PILLS */
.action-row { display:flex; gap:7px; margin-bottom:1.1rem; }
.apill { display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 13px; background:var(--bg2); border:1px solid var(--border); border-radius:999px; color:var(--muted); font-family:var(--font); font-size:0.8rem; cursor:pointer; white-space:nowrap; touch-action:manipulation; -webkit-appearance:none; appearance:none; transition:background .15s,border-color .15s,color .15s; }
.apill svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.apill.on { background:var(--accentbg); border-color:var(--accent); color:var(--accent2); }
.apill.amber-on { background:rgba(245,166,35,0.1); border-color:var(--amber); color:var(--amber); }

/* CARDS */
#card-list { display:flex; flex-direction:column; gap:8px; }
.fc { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r-lg); padding:1rem 1.1rem; cursor:pointer; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
.fc.revealed { border-color:rgba(124,109,250,0.4); background:var(--bg3); }
.fc-top { display:flex; gap:10px; align-items:flex-start; }
.fc-num { font-size:0.68rem; color:var(--muted); font-family:var(--mono); min-width:26px; padding-top:3px; flex-shrink:0; }
.fc-q { font-size:0.9rem; line-height:1.65; flex:1; color:var(--text); }
.star-btn { background:none; border:none; padding:4px; color:var(--muted); flex-shrink:0; display:flex; align-items:center; justify-content:center; min-width:32px; min-height:32px; border-radius:6px; cursor:pointer; touch-action:manipulation; -webkit-appearance:none; }
.star-btn svg { width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.star-btn.on { color:var(--amber); }
.star-btn.on svg { fill:var(--amber); }
.fc-ans { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:flex; align-items:flex-start; gap:8px; }
.ans-lbl { font-size:0.64rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; padding-top:3px; white-space:nowrap; flex-shrink:0; }
.ans-text { font-size:0.92rem; font-weight:600; color:var(--accent2); flex:1; filter:blur(7px); transition:filter .25s; line-height:1.5; }
.fc.revealed .ans-text { filter:none; -webkit-user-select:text; user-select:text; }
.tap-hint { font-size:0.68rem; color:var(--muted); white-space:nowrap; padding-top:3px; flex-shrink:0; }
.fc.revealed .tap-hint { display:none; }
.empty { text-align:center; padding:4rem 1rem; color:var(--muted); font-size:0.9rem; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(13,13,16,0.94); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; align-items:stretch; height:calc(var(--nav-h) + var(--safe-b)); padding-bottom:var(--safe-b); }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; border:none; background:none; color:var(--muted); font-family:var(--font); font-size:0.62rem; font-weight:500; cursor:pointer; letter-spacing:0.03em; text-transform:uppercase; touch-action:manipulation; -webkit-appearance:none; }
.nav-btn svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
.nav-btn.active { color:var(--accent2); }

/* TABLET */
@media(min-width:640px){
  .app-body { max-width:960px; margin:0 auto; padding:1.5rem 1.5rem calc(var(--nav-h) + var(--safe-b) + 1.5rem); }
  #card-list { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .fc { align-self:start; }
  .app-header { padding:0 1.75rem; height:60px; }
  .stat .val { font-size:1.6rem; }
}
/* DESKTOP */
@media(min-width:1024px){
  .app-body { max-width:1100px; padding-left:2rem; padding-right:2rem; }
  .app-header { padding:0 2rem; }
  .bottom-nav { max-width:600px; left:50%; right:auto; transform:translateX(-50%); border-left:1px solid var(--border); border-right:1px solid var(--border); border-radius:20px 20px 0 0; }
}
/* SMALL MOBILE */
@media(max-width:380px){
  .stat .val { font-size:1.1rem; }
  .stat .lbl { font-size:0.58rem; }
  .fc-q { font-size:0.86rem; }
  .apill { font-size:0.75rem; height:33px; padding:0 10px; }
}
</style>
</head>

/* ── DEVICE ID ──
   A unique ID generated once and stored in localStorage.
   This is the "user" identifier in Supabase — no login needed.
   To sync a new device, copy the ID from the banner and paste it
   into localStorage under the key 'haad_device_id'. */
function getDeviceId() {
  var id = localStorage.getItem('haad_device_id');
  if (!id) {
    id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
    localStorage.setItem('haad_device_id', id);
  }
  return id;
}

var sb        = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var deviceId  = getDeviceId();
var cards     = RAW.map(function(c,i){ return {q:c.q,a:c.a,id:i,revealed:false,starred:false}; });
var allRevealed = false;
var starFilter  = false;
var revFilter   = false;
var syncTimer;

/* ── SYNC STATUS DOT ── */
function setDot(state) {
  var dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state ? ' '+state : '');
}

/* ── LOAD STARS FROM SUPABASE ── */
function loadStars() {
  setDot('busy');
  sb.from('device_stars')
    .select('question_id')
    .eq('device_id', deviceId)
    .then(function(res) {
      if (res.error) { console.error(res.error); setDot('err'); fallbackLocal(); return; }
      var ids = {};
      res.data.forEach(function(r){ ids[r.question_id] = true; });
      cards.forEach(function(c){ c.starred = !!ids[c.id]; });
      setDot('ok');
      render();
      setTimeout(function(){ setDot(''); }, 2000);
    });
}

/* ── SAVE STAR TO SUPABASE ── */
function saveStar(card) {
  setDot('busy');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(function() {
    if (card.starred) {
      sb.from('device_stars')
        .upsert({ device_id: deviceId, question_id: card.id }, { onConflict: 'device_id,question_id' })
        .then(function(r){ setDot(r.error ? 'err' : 'ok'); setTimeout(function(){ setDot(''); },2000); });
    } else {
      sb.from('device_stars')
        .delete()
        .eq('device_id', deviceId)
        .eq('question_id', card.id)
        .then(function(r){ setDot(r.error ? 'err' : 'ok'); setTimeout(function(){ setDot(''); },2000); });
    }
    /* always mirror to localStorage as offline backup */
    var starred = cards.filter(function(c){ return c.starred; }).map(function(c){ return c.id; });
    try { localStorage.setItem('haad_stars_backup', JSON.stringify(starred)); } catch(e){}
  }, 300);
}

/* ── OFFLINE FALLBACK ── */
function fallbackLocal() {
  try {
    var saved = JSON.parse(localStorage.getItem('haad_stars_backup') || '[]');
    var ids = {};
    saved.forEach(function(id){ ids[id]=true; });
    cards.forEach(function(c){ c.starred = !!ids[c.id]; });
    render();
  } catch(e){}
}

/* ── BOOT ── */
document.addEventListener('DOMContentLoaded', function() {
  loadStars();
  render();

  /* Show device ID banner once on first ever launch */
  var seen = localStorage.getItem('haad_banner_seen');
  if (!seen) {
    document.getElementById('banner-id').textContent = deviceId;
    document.getElementById('sync-banner').classList.add('show');
  }
  document.getElementById('banner-close').addEventListener('click', function() {
    document.getElementById('sync-banner').classList.remove('show');
    localStorage.setItem('haad_banner_seen', '1');
  });

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('reveal-btn').addEventListener('click', toggleRevealAll);
  document.getElementById('star-filter-btn').addEventListener('click', toggleStarFilter);
  document.getElementById('shuffle-btn').addEventListener('click', shuffleCards);
  document.getElementById('nav-all').addEventListener('click', function(){ setNav('all'); });
  document.getElementById('nav-starred').addEventListener('click', function(){ setNav('starred'); });
  document.getElementById('nav-revealed').addEventListener('click', function(){ setNav('revealed'); });
  document.getElementById('nav-shuffle').addEventListener('click', function(){ shuffleCards(); flashNav('nav-shuffle'); });
});

/* ── NAV ── */
function setNav(tab) {
  starFilter = (tab==='starred');
  revFilter  = (tab==='revealed');
  ['all','starred','revealed','shuffle'].forEach(function(t){
    var el=document.getElementById('nav-'+t);
    if(el) el.classList.toggle('active', t===tab);
  });
  document.getElementById('star-filter-btn').classList.toggle('amber-on', starFilter);
  render();
}
function flashNav(id) {
  var el=document.getElementById(id);
  if(!el) return;
  el.classList.add('active');
  setTimeout(function(){ el.classList.remove('active'); }, 400);
}

/* ── CONTROLS ── */
function toggleRevealAll() {
  allRevealed=!allRevealed;
  cards.forEach(function(c){ c.revealed=allRevealed; });
  var btn=document.getElementById('reveal-btn');
  btn.classList.toggle('on',allRevealed);
  var eyeOn='<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg> Hide all';
  var eyeOff='<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Reveal all';
  btn.innerHTML=allRevealed?eyeOn:eyeOff;
  render();
}
function toggleStarFilter() {
  starFilter=!starFilter; revFilter=false;
  document.getElementById('star-filter-btn').classList.toggle('amber-on',starFilter);
  var tab=starFilter?'starred':'all';
  ['all','starred','revealed'].forEach(function(t){
    var el=document.getElementById('nav-'+t);
    if(el) el.classList.toggle('active',t===tab);
  });
  render();
}
function shuffleCards() {
  for(var i=cards.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=cards[i]; cards[i]=cards[j]; cards[j]=tmp;
  }
  render();
}
function toggleCard(id) {
  for(var i=0;i<cards.length;i++){ if(cards[i].id===id){ cards[i].revealed=!cards[i].revealed; break; } }
  render();
}
function toggleStar(id) {
  var card;
  for(var i=0;i<cards.length;i++){ if(cards[i].id===id){ cards[i].starred=!cards[i].starred; card=cards[i]; break; } }
  if(card) saveStar(card);
  render();
}

/* ── RENDER ── */
function render() {
  var q=(document.getElementById('search')||{value:''}).value.toLowerCase();
  var visible=cards.filter(function(c){
    return (!q||c.q.toLowerCase().indexOf(q)>=0||c.a.toLowerCase().indexOf(q)>=0)
        && (!starFilter||c.starred)
        && (!revFilter||c.revealed);
  });
  document.getElementById('s-total').textContent    = cards.length;
  document.getElementById('s-showing').textContent  = visible.length;
  document.getElementById('s-revealed').textContent = cards.filter(function(c){return c.revealed;}).length;
  document.getElementById('s-starred').textContent  = cards.filter(function(c){return c.starred;}).length;
  document.getElementById('header-count').textContent = visible.length+' / '+cards.length;

  var list=document.getElementById('card-list');
  if(!list) return;
  if(!visible.length){ list.innerHTML='<div class="empty">No cards found.</div>'; return; }

  var sOff='<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  var sOn ='<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:var(--amber);fill:var(--amber);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';

  var html='';
  for(var i=0;i<visible.length;i++){
    var c=visible[i];
    var num=(i+1)<10?'0'+(i+1):''+(i+1);
    html+='<div class="fc'+(c.revealed?' revealed':'')+'" data-id="'+c.id+'">'
      +'<div class="fc-top">'
      +'<span class="fc-num">'+num+'</span>'
      +'<span class="fc-q">'+c.q+'</span>'
      +'<button class="star-btn'+(c.starred?' on':'')+'" data-sid="'+c.id+'" aria-label="'+(c.starred?'Unstar':'Star')+'">'+(c.starred?sOn:sOff)+'</button>'
      +'</div>'
      +'<div class="fc-ans">'
      +'<span class="ans-lbl">Ans</span>'
      +'<span class="ans-text">'+c.a+'</span>'
      +'<span class="tap-hint">tap to reveal</span>'
      +'</div>'
      +'</div>';
  }
  list.innerHTML=html;
  list.onclick=function(e){
    var starEl=e.target.closest('.star-btn');
    if(starEl){ e.stopPropagation(); toggleStar(parseInt(starEl.dataset.sid)); return; }
    var card=e.target.closest('.fc');
    if(card) toggleCard(parseInt(card.dataset.id));
  };
}
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js'); });
}
</script>
