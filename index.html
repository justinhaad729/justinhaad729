/* ── DEVICE ID ──
   A unique ID generated once and stored in localStorage.
   This is the "user" identifier in Supabase — no login needed.
   To sync a new device, copy the ID from the banner and paste it
   into localStorage under the key 'haad_device_id'. */
function getDeviceId() {
  var id = localStorage.getItem('haad_device_id');
  if (!id) {
    id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
    localStorage.setItem('haad_device_id', id);
  }
  return id;
}

var sb        = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var deviceId  = getDeviceId();
var cards     = RAW.map(function(c,i){ return {q:c.q,a:c.a,id:i,revealed:false,starred:false}; });
var allRevealed = false;
var starFilter  = false;
var revFilter   = false;
var syncTimer;

/* ── SYNC STATUS DOT ── */
function setDot(state) {
  var dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state ? ' '+state : '');
}

/* ── LOAD STARS FROM SUPABASE ── */
function loadStars() {
  setDot('busy');
  sb.from('device_stars')
    .select('question_id')
    .eq('device_id', deviceId)
    .then(function(res) {
      if (res.error) { console.error(res.error); setDot('err'); fallbackLocal(); return; }
      var ids = {};
      res.data.forEach(function(r){ ids[r.question_id] = true; });
      cards.forEach(function(c){ c.starred = !!ids[c.id]; });
      setDot('ok');
      render();
      setTimeout(function(){ setDot(''); }, 2000);
    });
}

/* ── SAVE STAR TO SUPABASE ── */
function saveStar(card) {
  setDot('busy');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(function() {
    if (card.starred) {
      sb.from('device_stars')
        .upsert({ device_id: deviceId, question_id: card.id }, { onConflict: 'device_id,question_id' })
        .then(function(r){ setDot(r.error ? 'err' : 'ok'); setTimeout(function(){ setDot(''); },2000); });
    } else {
      sb.from('device_stars')
        .delete()
        .eq('device_id', deviceId)
        .eq('question_id', card.id)
        .then(function(r){ setDot(r.error ? 'err' : 'ok'); setTimeout(function(){ setDot(''); },2000); });
    }
    /* always mirror to localStorage as offline backup */
    var starred = cards.filter(function(c){ return c.starred; }).map(function(c){ return c.id; });
    try { localStorage.setItem('haad_stars_backup', JSON.stringify(starred)); } catch(e){}
  }, 300);
}

/* ── OFFLINE FALLBACK ── */
function fallbackLocal() {
  try {
    var saved = JSON.parse(localStorage.getItem('haad_stars_backup') || '[]');
    var ids = {};
    saved.forEach(function(id){ ids[id]=true; });
    cards.forEach(function(c){ c.starred = !!ids[c.id]; });
    render();
  } catch(e){}
}

/* ── BOOT ── */
document.addEventListener('DOMContentLoaded', function() {
  loadStars();
  render();

  /* Show device ID banner once on first ever launch */
  var seen = localStorage.getItem('haad_banner_seen');
  if (!seen) {
    document.getElementById('banner-id').textContent = deviceId;
    document.getElementById('sync-banner').classList.add('show');
  }
  document.getElementById('banner-close').addEventListener('click', function() {
    document.getElementById('sync-banner').classList.remove('show');
    localStorage.setItem('haad_banner_seen', '1');
  });

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('reveal-btn').addEventListener('click', toggleRevealAll);
  document.getElementById('star-filter-btn').addEventListener('click', toggleStarFilter);
  document.getElementById('shuffle-btn').addEventListener('click', shuffleCards);
  document.getElementById('nav-all').addEventListener('click', function(){ setNav('all'); });
  document.getElementById('nav-starred').addEventListener('click', function(){ setNav('starred'); });
  document.getElementById('nav-revealed').addEventListener('click', function(){ setNav('revealed'); });
  document.getElementById('nav-shuffle').addEventListener('click', function(){ shuffleCards(); flashNav('nav-shuffle'); });
});

/* ── NAV ── */
function setNav(tab) {
  starFilter = (tab==='starred');
  revFilter  = (tab==='revealed');
  ['all','starred','revealed','shuffle'].forEach(function(t){
    var el=document.getElementById('nav-'+t);
    if(el) el.classList.toggle('active', t===tab);
  });
  document.getElementById('star-filter-btn').classList.toggle('amber-on', starFilter);
  render();
}
function flashNav(id) {
  var el=document.getElementById(id);
  if(!el) return;
  el.classList.add('active');
  setTimeout(function(){ el.classList.remove('active'); }, 400);
}

/* ── CONTROLS ── */
function toggleRevealAll() {
  allRevealed=!allRevealed;
  cards.forEach(function(c){ c.revealed=allRevealed; });
  var btn=document.getElementById('reveal-btn');
  btn.classList.toggle('on',allRevealed);
  var eyeOn='<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg> Hide all';
  var eyeOff='<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Reveal all';
  btn.innerHTML=allRevealed?eyeOn:eyeOff;
  render();
}
function toggleStarFilter() {
  starFilter=!starFilter; revFilter=false;
  document.getElementById('star-filter-btn').classList.toggle('amber-on',starFilter);
  var tab=starFilter?'starred':'all';
  ['all','starred','revealed'].forEach(function(t){
    var el=document.getElementById('nav-'+t);
    if(el) el.classList.toggle('active',t===tab);
  });
  render();
}
function shuffleCards() {
  for(var i=cards.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=cards[i]; cards[i]=cards[j]; cards[j]=tmp;
  }
  render();
}
function toggleCard(id) {
  for(var i=0;i<cards.length;i++){ if(cards[i].id===id){ cards[i].revealed=!cards[i].revealed; break; } }
  render();
}
function toggleStar(id) {
  var card;
  for(var i=0;i<cards.length;i++){ if(cards[i].id===id){ cards[i].starred=!cards[i].starred; card=cards[i]; break; } }
  if(card) saveStar(card);
  render();
}

/* ── RENDER ── */
function render() {
  var q=(document.getElementById('search')||{value:''}).value.toLowerCase();
  var visible=cards.filter(function(c){
    return (!q||c.q.toLowerCase().indexOf(q)>=0||c.a.toLowerCase().indexOf(q)>=0)
        && (!starFilter||c.starred)
        && (!revFilter||c.revealed);
  });
  document.getElementById('s-total').textContent    = cards.length;
  document.getElementById('s-showing').textContent  = visible.length;
  document.getElementById('s-revealed').textContent = cards.filter(function(c){return c.revealed;}).length;
  document.getElementById('s-starred').textContent  = cards.filter(function(c){return c.starred;}).length;
  document.getElementById('header-count').textContent = visible.length+' / '+cards.length;

  var list=document.getElementById('card-list');
  if(!list) return;
  if(!visible.length){ list.innerHTML='<div class="empty">No cards found.</div>'; return; }

  var sOff='<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  var sOn ='<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:var(--amber);fill:var(--amber);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';

  var html='';
  for(var i=0;i<visible.length;i++){
    var c=visible[i];
    var num=(i+1)<10?'0'+(i+1):''+(i+1);
    html+='<div class="fc'+(c.revealed?' revealed':'')+'" data-id="'+c.id+'">'
      +'<div class="fc-top">'
      +'<span class="fc-num">'+num+'</span>'
      +'<span class="fc-q">'+c.q+'</span>'
      +'<button class="star-btn'+(c.starred?' on':'')+'" data-sid="'+c.id+'" aria-label="'+(c.starred?'Unstar':'Star')+'">'+(c.starred?sOn:sOff)+'</button>'
      +'</div>'
      +'<div class="fc-ans">'
      +'<span class="ans-lbl">Ans</span>'
      +'<span class="ans-text">'+c.a+'</span>'
      +'<span class="tap-hint">tap to reveal</span>'
      +'</div>'
      +'</div>';
  }
  list.innerHTML=html;
  /* Replace image placeholders */
  list.querySelectorAll('.fc-q').forEach(function(el){
    if(el.innerHTML.indexOf('__IMG_SUPRA__') !== -1){
      var imgEl = document.getElementById('img-supra');
      if(imgEl){
        el.innerHTML = el.innerHTML.replace('__IMG_SUPRA__',
          '<img src="'+imgEl.src+'" style="width:100%;max-width:220px;border-radius:8px;margin:8px 0;display:block;border:1px solid #2a2a35;" alt="Supraspinatus test" />');
      }
    }
    if(el.innerHTML.indexOf('__IMG_ACL__') !== -1){
      var imgEl2 = document.getElementById('img-acl');
      if(imgEl2){
        el.innerHTML = el.innerHTML.replace('__IMG_ACL__',
          '<img src="'+imgEl2.src+'" style="width:100%;max-width:220px;border-radius:8px;margin:8px 0;display:block;border:1px solid #2a2a35;" alt="ACL test" />');
      }
    }
    if(el.innerHTML.indexOf('__IMG_CHAIR__') !== -1){
      var imgEl3 = document.getElementById('img-chair');
      if(imgEl3){
        el.innerHTML = el.innerHTML.replace('__IMG_CHAIR__',
          '<img src="'+imgEl3.src+'" style="width:100%;max-width:360px;border-radius:8px;margin:8px 0;display:block;border:1px solid #2a2a35;" alt="Chair posture" />');
      }
    }
    if(el.innerHTML.indexOf('__IMG_HEEL__') !== -1){
      var imgEl4 = document.getElementById('img-heel');
      if(imgEl4){
        el.innerHTML = el.innerHTML.replace('__IMG_HEEL__',
          '<img src="'+imgEl4.src+'" style="width:100%;max-width:220px;border-radius:8px;margin:8px 0;display:block;border:1px solid #2a2a35;" alt="Heel ulcer" />');
      }
    }
    if(el.innerHTML.indexOf('__IMG_LIFT__') !== -1){
      var imgEl5 = document.getElementById('img-lift');
      if(imgEl5){
        el.innerHTML = el.innerHTML.replace('__IMG_LIFT__',
          '<img src="'+imgEl5.src+'" style="width:100%;max-width:360px;border-radius:8px;margin:8px 0;display:block;border:1px solid #2a2a35;" alt="Stoop vs squat lift" />');
      }
    }
  });

  list.onclick=function(e){
    var starEl=e.target.closest('.star-btn');
    if(starEl){ e.stopPropagation(); toggleStar(parseInt(starEl.dataset.sid)); return; }
    var card=e.target.closest('.fc');
    if(card) toggleCard(parseInt(card.dataset.id));
  };
}
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js'); });
}
