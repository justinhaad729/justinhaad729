<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#7c6dfa" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="HAAD" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>HAAD</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0d0d10; --bg2:#17171c; --bg3:#1f1f26; --bg4:#27272f;
  --border:#2a2a35; --border2:#3a3a48;
  --text:#eeeef5; --muted:#6e6e88;
  --accent:#7c6dfa; --accent2:#a996ff; --accentbg:rgba(124,109,250,0.10);
  --green:#2dd4a0; --amber:#f5a623; --red:#f06060;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:12px; --r-lg:18px;
  --nav-h:64px; --safe-b:env(safe-area-inset-bottom,0px);
}
html { font-family:var(--font); background:var(--bg); color:var(--text); font-size:16px; height:100%; }
body { min-height:100%; overscroll-behavior:none; }

/* SYNC BANNER */
#sync-banner {
  position:fixed; top:0; left:0; right:0; z-index:999;
  background:var(--bg3); border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  transform:translateY(-100%); transition:transform .3s ease;
}
#sync-banner.show { transform:translateY(0); }
#sync-banner p { font-size:0.82rem; color:var(--text); flex:1; }
#sync-banner p span { color:var(--accent2); font-family:var(--mono); font-size:0.75rem; word-break:break-all; }
.banner-close { background:none; border:1px solid var(--border2); border-radius:var(--r); color:var(--muted); font-family:var(--font); font-size:0.75rem; padding:4px 10px; cursor:pointer; white-space:nowrap; touch-action:manipulation; }

/* HEADER */
.app-header {
  position:sticky; top:0; z-index:200;
  background:rgba(13,13,16,0.92); backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  height:56px; padding:0 1.25rem;
  padding-top:env(safe-area-inset-top,0px);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.header-logo { font-size:1.1rem; font-weight:700; letter-spacing:-0.02em; }
.header-logo span { color:var(--accent2); }
.header-right { display:flex; align-items:center; gap:8px; }
.header-count { font-size:0.72rem; color:var(--muted); font-family:var(--mono); background:var(--bg3); border:1px solid var(--border); border-radius:999px; padding:3px 10px; white-space:nowrap; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background .3s; }
.sync-dot.ok  { background:var(--green); }
.sync-dot.err { background:var(--red); }
.sync-dot.busy { background:var(--amber); animation:pulse .8s infinite alternate; }
@keyframes pulse { from{opacity:1} to{opacity:0.3} }

/* BODY */
.app-body { overflow-y:auto; padding:1.25rem 1rem calc(var(--nav-h) + var(--safe-b) + 1rem); -webkit-overflow-scrolling:touch; }

/* STATS */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:1.1rem; }
.stat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:0.7rem 0.75rem; }
.stat .lbl { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:3px; }
.stat .val { font-size:1.35rem; font-weight:600; font-family:var(--mono); line-height:1; color:var(--text); }
.stat .val.ca { color:var(--accent2); }
.stat .val.cg { color:var(--green); }
.stat .val.co { color:var(--amber); }

/* SEARCH */
.search-wrap { position:relative; margin-bottom:0.85rem; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; stroke:var(--muted); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; pointer-events:none; }
#search { width:100%; height:44px; padding:0 12px 0 38px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:var(--font); font-size:0.9rem; outline:none; -webkit-appearance:none; }
#search:focus { border-color:var(--accent); }
#search::placeholder { color:var(--muted); }

/* ACTION PILLS */
.action-row { display:flex; gap:7px; margin-bottom:1.1rem; }
.apill { display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 13px; background:var(--bg2); border:1px solid var(--border); border-radius:999px; color:var(--muted); font-family:var(--font); font-size:0.8rem; cursor:pointer; white-space:nowrap; touch-action:manipulation; -webkit-appearance:none; appearance:none; transition:background .15s,border-color .15s,color .15s; }
.apill svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.apill.on { background:var(--accentbg); border-color:var(--accent); color:var(--accent2); }
.apill.amber-on { background:rgba(245,166,35,0.1); border-color:var(--amber); color:var(--amber); }

/* CARDS */
#card-list { display:flex; flex-direction:column; gap:8px; }
.fc { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r-lg); padding:1rem 1.1rem; cursor:pointer; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
.fc.revealed { border-color:rgba(124,109,250,0.4); background:var(--bg3); }
.fc-top { display:flex; gap:10px; align-items:flex-start; }
.fc-num { font-size:0.68rem; color:var(--muted); font-family:var(--mono); min-width:26px; padding-top:3px; flex-shrink:0; }
.fc-q { font-size:0.9rem; line-height:1.65; flex:1; color:var(--text); }
.fc-q img { width:100%; max-width:220px; border-radius:8px; margin:8px 0; display:block; border:1px solid var(--border); }
.star-btn { background:none; border:none; padding:4px; color:var(--muted); flex-shrink:0; display:flex; align-items:center; justify-content:center; min-width:32px; min-height:32px; border-radius:6px; cursor:pointer; touch-action:manipulation; -webkit-appearance:none; }
.star-btn svg { width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.star-btn.on { color:var(--amber); }
.star-btn.on svg { fill:var(--amber); }
.fc-ans { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:flex; align-items:flex-start; gap:8px; }
.ans-lbl { font-size:0.64rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; padding-top:3px; white-space:nowrap; flex-shrink:0; }
.ans-text { font-size:0.92rem; font-weight:600; color:var(--accent2); flex:1; filter:blur(7px); transition:filter .25s; line-height:1.5; }
.fc.revealed .ans-text { filter:none; -webkit-user-select:text; user-select:text; }
.tap-hint { font-size:0.68rem; color:var(--muted); white-space:nowrap; padding-top:3px; flex-shrink:0; }
.fc.revealed .tap-hint { display:none; }
.empty { text-align:center; padding:4rem 1rem; color:var(--muted); font-size:0.9rem; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(13,13,16,0.94); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; align-items:stretch; height:calc(var(--nav-h) + var(--safe-b)); padding-bottom:var(--safe-b); }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; border:none; background:none; color:var(--muted); font-family:var(--font); font-size:0.62rem; font-weight:500; cursor:pointer; letter-spacing:0.03em; text-transform:uppercase; touch-action:manipulation; -webkit-appearance:none; }
.nav-btn svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
.nav-btn.active { color:var(--accent2); }

/* TABLET */
@media(min-width:640px){
  .app-body { max-width:960px; margin:0 auto; padding:1.5rem 1.5rem calc(var(--nav-h) + var(--safe-b) + 1.5rem); }
  #card-list { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .fc { align-self:start; }
  .app-header { padding:0 1.75rem; height:60px; }
  .stat .val { font-size:1.6rem; }
}
/* DESKTOP */
@media(min-width:1024px){
  .app-body { max-width:1100px; padding-left:2rem; padding-right:2rem; }
  .app-header { padding:0 2rem; }
  .bottom-nav { max-width:600px; left:50%; right:auto; transform:translateX(-50%); border-left:1px solid var(--border); border-right:1px solid var(--border); border-radius:20px 20px 0 0; }
}
/* SMALL MOBILE */
@media(max-width:380px){
  .stat .val { font-size:1.1rem; }
  .stat .lbl { font-size:0.58rem; }
  .fc-q { font-size:0.86rem; }
  .apill { font-size:0.75rem; height:33px; padding:0 10px; }
}
</style>
</head>

var RAW = [
  {q:"A patient sustained a fracture of the proximal humerus, which has healed well. Upon examination, the therapist notes limitation in active shoulder flexion. The scapula protracts, elevates and upwardly rotates early, and elevates excessively when the patient attempts to lift their arm. The NEXT thing the therapist should do is:",a:"Passive shoulder flexion and glenohumeral accessory mobility testing"},
  {q:"Which of the following exercises should be used for a patient 2 weeks post-transurethral resection of the prostate (TURP) without complications?",a:"Kegel exercises"},
  {q:"A PT is supervising the exercise of a cardiac rehabilitation outpatient class on a very hot day, with temperatures expected to be above 90°F. The class is scheduled for 2pm and the facility is not air-conditioned. The BEST strategy is to:",a:"Decrease the exercise intensity by slowing the pace of exercise"},
  {q:"A patient has a transtibial amputation and has recently been fitted with a patellar tendon-bearing (PTB) socket. During initial prosthetic checkout, the PT instructs the patient to walk and then sit and remove the prosthesis. Upon skin inspection, the therapist would expect no redness in the area of the:",a:"Anterior tibia and tibial crest"},
  {q:"A patient who is terminally ill with cancer is in tears, unable to cope with the changes in life and current hospitalization. The PT has a referral for gait training so that the patient can be discharged to home under hospice care. The BEST approach is to:",a:"Take time now to allow the patient to express fears and frustrations"},
  {q:"The examination reveals muscle spasm of the piriformis, which is compressing the sciatic nerve and producing pain in the posterior hip region. The pain has been worsening over the past 3 months. What is the correct ultrasound (US) setting for this case?",a:"1 MHz continuous at 1.0 W/cm²"},
  {q:"An injury classified as ASIA A is a complete injury. The lesion is below L1, making it a cauda equina injury (lower motor neuron injury). Because regeneration is possible, what can be expected?",a:"Some recovery of function, because damage is to the peripheral nerve roots"},
  {q:"A patient with left hemiplegia receives a new AFO. The PT is overwhelmed and asks a PT student (first affiliation, second day) to perform an orthotic checkout. The supervising therapist will be nearby. This task should be:",a:"Delegated to another PT"},
  {q:"A patient has been diagnosed with acute synovitis of the temporomandibular joint. Early intervention should focus on:",a:"Instruction to eat a soft food diet and phonophoresis"},
  {q:"During cervical spine examination, the PT observes restricted left rotation at C7-T1. After stabilizing the thoracic spine, the hand placement for mobilization to improve left rotation should be at the:",a:"Posterior right C7 articular pillar"},
  {q:"An appropriate fine motor behavior that should be established by 9 months of age is the ability to:",a:"Transfer objects from one hand to another"},
  {q:"A patient with a 10-year history of Parkinson's disease has been taking levodopa for 5 years. The patient presents with deteriorating function and constant uncontrolled involuntary (dancing, athetoid-like) movements of the legs. The therapist's BEST course of action is to:",a:"Document the observations and refer the patient back to the physician for possible medication adjustment"},
  {q:"A patient scheduled for surgery for a chronic shoulder dislocation asks the PT to explain post-surgical rehabilitation. The therapist's BEST response is to:",a:"Explain how patients typically respond to the surgery and outline the progression of exercises"},
  {q:"Which of the following is a correct reason to terminate a maximum tolerance test for a patient with pulmonary dysfunction?",a:"Patient exhibits dyspnea and a drop of 20 mmHg in arterial oxygen pressure (PaO₂)"},
  {q:"A patient with complete T10 paraplegia (ASIA A) is receiving initial ambulation training with bilateral Craig-Scott KAFOs and axillary crutches. Because a reciprocal gait pattern is problematic, the BEST INITIAL gait pattern to teach is a:",a:"Swing-to gait"},
  {q:"After mastectomy, a home care patient cannot accept the loss of her breast. She reports being weepy all the time, losing sleep, and having no energy. The BEST action the PT can take is to:",a:"Contact her primary physician and request a psychological consult"},
  {q:"An individual with a BMI of 33 kg/m² is referred to an outpatient exercise program. The PT recognizes this patient is at increased risk for:",a:"Hyperthermia during exercise"},
  {q:"A patient is 10 days post-op left total knee arthroplasty and complains of back and groin pain of 7/10 when lying in bed or sitting, and 5/10 when standing. A recent INR is within therapeutic levels. Which screening question is the BEST choice considering these new symptoms?",a:"When was your last bowel movement?"},
  {q:"During an examination of a patient who complains of back pain, the PT notes pain with end range AROM into left hip flexion, abduction, and external rotation. The origin of the pain is MOST LIKELY the:",a:"Sacroiliac (SI) joint"},
  {q:"A PT wants to compare frequencies of carpal tunnel syndrome occurring in assembly line workers and computer programmers. The appropriate statistical tool is:",a:"Chi-square test"},
  {q:"In a research study with a skewed distribution and extreme scores on a balance measure that deviate from the total group's performance, the MOST accurate representation of central tendency is:",a:"Median"},
  {q:"A factory worker injured the right arm with damage to the ulnar nerve at the elbow. An EMG performed 3 weeks after the injury shows spontaneous fibrillation potentials. The PT recognizes that:",a:"Denervation has occurred"},
  {q:"A patient is recovering from a right CVA, resulting in severe hemiplegia and visuospatial deficits, plus a large diabetic ulcer on the left foot with pitting edema. The BEST wheelchair prescription for this patient is:",a:"Hemiplegic chair with elevating leg-rest on the left"},
  {q:"A 14-year-old boy with advanced Duchenne's muscular dystrophy undergoes a pulmonary function test. The value UNLIKELY to show any deviation from normal is:",a:"Functional residual capacity"},
  {q:"A patient fractured the right mid tibia 3 months ago. After cast removal, severe foot drop was noted. The patient wants to try functional electrical stimulation (FES) as an orthotic substitute. The PT would set up FES to contract the appropriate muscles during:",a:"Mid swing"},
  {q:"A PT has weeping dermatitis on the back of the hand and is scheduled to treat a patient with HIV for wound management. The therapist should:",a:"Refuse to treat that patient"},
  {q:"As a PT progresses through a knee examination and suspects ACL deficiency in the right knee, which of the following tests would be UNNECESSARY for determining whether the ACL was ruptured?",a:"Anterior drawer test"},
  {q:"An elderly patient hospitalized for 3 days with pneumonia has progressed to walking with standby assistance and a rolling walker, but endurance is only up to 15 feet — not enough to reach the bathroom (20 feet). The therapist should recommend:",a:"A bedside commode and referral for home health services"},
  {q:"A PT examines a patient with a right CVA and determines the patient has a profound deficit of homonymous hemianopsia. The BEST INITIAL strategy to assist the patient in compensating for this deficit is to:",a:"Teach the patient to turn the head to the affected left side"},
  {q:"A patient with MS exhibits moderate fatigue during a 30-minute exercise session. Two days later, the patient reports going right back to bed after the last session, unable to get up until late afternoon the next day. The PT's BEST strategy is to:",a:"Utilize a distributed practice schedule"},
  {q:"A middle-aged adult running a marathon collapses well short of the finish line. Ambient temperature is 92°F, body temperature is 101°F, rapid pulse, rapid respirations, skin feels warm and dry, and the individual is confused. The therapist recognizes these findings are consistent with:",a:"Hypovolemic shock"},
  {q:"A patient with a venous stasis ulcer near the left medial malleolus is referred for PT. Skin changes consistent with stasis dermatitis are evident. Physical examination reveals patent femoral, popliteal, and pedal pulses, and an enlarged greater saphenous vein in standing. The MOST important PT intervention to consider is:",a:"Compression therapy with exercise"},
  {q:"A patient recovering from stroke is having difficulty bearing weight on the left leg, is unable to advance the tibia forward, and abbreviates the end of the stance phase on the left going directly to swing. The MOST likely cause is:",a:"Spasticity or contracture of the plantar flexors"},
  {q:"With a traction injury to the anterior division of the brachial plexus, the PT would expect weakness of the elbow flexors, wrist flexors, and forearm pronators, as well as additional weakness in:",a:"Thumb abduction"},
  {q:"A frail elderly patient admitted to a skilled nursing facility following a fall-related hip fracture is extremely agitated and demonstrates early signs of dementia, exclaiming 'Leave me alone, I just want to get out of here!' An important approach while working with this patient is to:",a:"Be calm and supportive, and use only one or two-level commands"},
  {q:"An elderly patient is being treated for depression following the death of her husband. She is currently taking amitriptyline (tricyclic antidepressant) and has a recent history of a fall. The PT suspects the precipitating cause of the fall is the medication, because it can cause:",a:"Postural hypotension"},
  {q:"A patient with class III heart disease in and out of congestive heart failure is prescribed digitalis (Digoxin). The patient will demonstrate understanding of its adverse side effects by recognizing the importance of contacting the physician with the appearance of:",a:"Weakness and arrhythmias"},
  {q:"A patient with HIV is hospitalized with a viral infection and has a history of four infectious episodes within the past year. The PT recognizes that ongoing systemic effects are likely to include:",a:"Low-grade fever, malaise, anemia, and fatigue"},
  {q:"A PT is treating a patient with active hepatitis B infection. Transmission of the disease is best minimized if the PT:",a:"Wears gloves during any direct contact with blood or body fluids"},
  {q:"A patient complains of pain (7/10) and limited ROM of the right shoulder due to chronic overuse. The PT elects to use procaine hydrochloride iontophoresis. To administer this substance, it would be appropriate to use:",a:"Continuous biphasic current, with the medication under the anode"},
  {q:"A contraindication to initiating extremity joint mobilization on a patient with chronic pulmonary disease may include:",a:"Long-term corticosteroid therapy"},
  {q:"An elderly frail individual receiving home PT has a 4-year history of taking NSAIDs for joint pain and recently began taking verapamil (calcium channel blocker). The PT examines for possible adverse reactions that could include:",a:"Stomach pain, hypertension, confusion"},
  {q:"A computer programmer presents with fever, shaking chills, worsening productive cough, and chest pain over the posterior base of the left thorax made worse on inspiration. An x-ray shows an infiltrate at the lower left thorax posterior base. This patient's chest pain is MOST likely caused by:",a:"Infected pleura"},
  {q:"An elderly patient has an irregular, dark pigmented ulcer over the medial malleolus. The patient states it is not painful. The MOST likely diagnosis is:",a:"Venous ulcer"},
  {q:"An elderly frail resident of an extended care facility presents with hot, red, and edematous skin over the shins of both lower extremities, and a mild fever. The MOST likely cause of the symptoms is:",a:"Cellulitis"},
  {q:"A 10-year-old presents with pain (4/10) and limited knee ROM (5-95°) following surgical repair of the medial collateral ligament and ACL. The modality that can be used with PRECAUTION is:",a:"Low-dose ultrasound (USE)"},
  {q:"A weight lifter exhibits marked hypertrophy after embarking on a strength training regime. Hypertrophy can be expected to occur following at least:",a:"6-8 weeks of training"},
  {q:"A diagnosis of bicipital tendinitis has been made following an evaluation of a patient with shoulder pain. The BEST shoulder position to expose the tendon of the long head of the biceps for application of phonophoresis would be:",a:"Lateral rotation and extension"},
  {q:"A patient is unable to bring a foot up to the next step during stair climbing training. The PT's BEST course of action to promote learning of this task is to have the patient practice:",a:"Step-ups onto a low step while in the parallel bars"},
  {q:"A patient is transferred to a burn clinic with deep, partial-thickness burns over 30% of the body. Healing of this type of burn is characterized by:",a:"Marked edema with slow healing and extensive hypertrophic scarring"},
  {q:"A patient with a complete SCI at the T6 level is being discharged home after 2 months of rehabilitation. Three standard-height steps go into his home and a ramp will have to be constructed for wheelchair access. The recommended length of his ramp should be:",a:"252 inches (21 feet)"},
  {q:"A high school wrestler has been taking anabolic-androgenic steroids for the past 6 months to build muscle and improve performance. The PT working with the team suspects illegal drug use and examines the athlete for:",a:"Rapid weight gain, marked muscular hypertrophy, mood swings"},
  {q:"A patient with diagnosis of left-sided heart failure (CHF), class II, is referred for physical therapy. During exercise, this patient can be expected to demonstrate:",a:"Dyspnea with fatigue and muscular weakness"},
  {q:"A PT is instructing a student in proper positioning to prevent the typical contractures in the patient with a transfemoral amputation. The therapist stresses positioning the patient in:",a:"Prone-lying with the residual limb in neutral rotation"},
  {q:"A PT receives a referral to ambulate a patient who is insulin-dependent. A review of the medical record shows a blood glucose level of 310 mg/dL. The therapist's BEST course of action is to:",a:"Postpone therapy and consult with the medical staff as soon as possible"},
  {q:"A newborn with Erb-Klumpke palsy is referred for physical therapy. INITIALLY, the plan of care (POC) should include:",a:"Partial immobilization of the limb across the abdomen, followed by gentle ROM after immobilization"},
  {q:"A 6-month-old child was referred to physical therapy for right torticollis. The MOST effective method to stretch the muscle is by positioning the head and neck into:",a:"Extension, left side-bending and right rotation"},
  {q:"A student is on final internship and is overheard discussing a patient's history in the elevator. When the PT points this out, the student claims to be unaware of any hospital policy regarding confidentiality. The therapist's BEST analysis is that:",a:"The student should be expected to value patient confidentiality"},
  {q:"A PT is performing clinical research using a single-case experimental design with an A-B-A-B format. Her hypothesis states that pain rating scores will decrease with the treatment intervention. Acceptance of this hypothesis would be indicated if:",a:"B is less than A"},
  {q:"A patient recovering from stroke demonstrates good recovery in the lower extremity (out-of-synergy movement control). Timing deficits are apparent during walking. Isokinetic training can be used to improve:",a:"Rate control at varying movement speeds"},
  {q:"An elderly patient with a transfemoral amputation is having difficulty wrapping the residual limb. The PT's BEST course of action is to:",a:"Use a shrinker"},
  {q:"A patient with peripheral vascular disease has been referred for conditioning exercise. The patient demonstrates moderate claudication pain in both legs following a 12-minute walking test. The MOST beneficial exercise frequency and duration is:",a:"5 times/week, BID 10 minutes/session"},
  {q:"The radiographic view that demonstrates the observed spinal defect of the pars interarticularis is:",a:"Oblique view"},
  {q:"A PT is working with a patient with metastatic breast cancer who has been told she has only months to live. She is quite angry and disruptive during therapy. The PT recognizes that the MOST beneficial interaction is to:",a:"Allow the patient to express her anger, while refocusing her on effective coping strategies"},
  {q:"While driving the ball during a golf match, a patient felt an immediate sharp pain in the right lower back. The following morning, the patient reported stiffness, with easing of pain after taking a shower. The source of the pain is MOST likely:",a:"Facet joint impingement"},
  {q:"At 10am, a PT is treating a patient with paraplegia who smells of alcohol and has difficulty accomplishing a bed-to-chair transfer that was previously done without assistance. In this case, the therapist should:",a:"Document the findings and immediately inform the patient's physician and nurse in charge"},
  {q:"A patient with right hemiparesis has difficulty clearing the more affected foot during the swing phase of gait. An appropriate physical therapy intervention for the right lower extremity might include:",a:"Forward step-ups in standing using graduated height steps"},
  {q:"A researcher reviewed literature on moderate exercise for maintaining independence in persons with ALS. Nine studies were found: two clinical case reports, two cohort studies, three single RCTs, and two multicenter RCTs. According to levels of evidence (Sackett), which studies provide the best evidence?",a:"Multicenter RCTs"},
  {q:"A patient is 4 weeks post-MI. Resistive training using weights to improve muscular strength and endurance is appropriate:",a:"If exercise capacity is greater than 5 METs with no anginal symptoms or ST segment depression"},
  {q:"A patient diagnosed with lumbar spinal root impingement due to narrowing of the intervertebral foramen has been referred for mechanical traction. What is the lowest percentage of body weight for the initial traction force when using a split table?",a:"25%"},
  {q:"A fitness instructor who is 8 months pregnant was recently diagnosed with placenta previa. The PT's most important instructions are to continue:",a:"Pelvic floor exercises and discontinue any abdominal exercises"},
  {q:"The most appropriate imaging view to identify abnormal anatomy of the pars interarticularis in the lumbar region is:",a:"Oblique view"},
  {q:"A patient with breast cancer had surgical removal of the mass, followed by 12 weeks of chemotherapy and 8 weeks of radiation therapy. She is referred for mobilization of her upper extremity. In providing post-radiation therapy, it is important to:",a:"Observe skin care precautions"},
  {q:"A patient with Parkinson's disease demonstrates a highly stereotyped gait pattern characterized by impoverished movement and a festinating gait. The MOST beneficial intervention is:",a:"Locomotor training using a motorized treadmill and body weight support harness"},
  {q:"A patient recovering from a right CVA asks for a can of soda and is instructed to open it but cannot. Later, when alone, the therapist observes the patient drinking from the can, having opened it on his own. The therapist suspects the patient may have a primary deficit in:",a:"Ideomotor apraxia"},
  {q:"A patient with brittle (uncontrolled) diabetes mellitus begins experiencing lethargy, vomiting, and abdominal pain during a prosthetic checkout. The therapist notes weakness with some confusion and suspects:",a:"Ketoacidosis"},
  {q:"A 62-year-old patient has COPD. Which of these pulmonary test results will NOT be increased compared with those of a normal 62-year-old individual?",a:"FEV1/FVC (forced vital capacity) ratio"},
  {q:"A patient with a transfemoral amputation fitted with a quadrilateral socket prosthesis is undergoing prosthetic checkout. Pressure tolerance areas of the residual limb to examine include:",a:"Ischial tuberosity and lateral sides of residual limb"},
  {q:"A patient recently diagnosed with fibromyalgia and chronic fatigue immune system dysfunction shows loss of interest in activities, poor eating, sleep problems, and has talked about suicide as her only hope. The PT's BEST course of action is to:",a:"Immediately contact her primary physician"},
  {q:"An elderly patient confined to bed for 2 months demonstrates limited ROM in both lower extremities (hip flexion 5-115°, knee flexion 10-120°). The MOST beneficial intervention to improve flexibility and ready the patient for standing is:",a:"Mechanical stretching using traction and 5 lb weights, 2 hours, twice daily"},
  {q:"A patient with DJD of the lumbar facet joints complains of numbness, paresthesia, and weakness of the bilateral lower extremities that increase with extended positions or walking greater than 100 feet, with pain persisting for hours after resting. The patient can ride a stationary bike for 30 minutes without problems. Physical therapy intervention should include:",a:"Limiting extended spinal positions and improving the dynamic control of the trunk musculature"},
  {q:"A PT is instructing a kindergarten teacher in a behavior management program for a child with developmental disabilities who has been mainstreamed. The therapist requests the teacher encourage the child to maintain a head-retracted sitting position. The MOST beneficial strategy is to:",a:"Have the teacher give a smile sticker when the child sits with the head retracted"},
  {q:"A PT has recently attended a professional conference on myofascial release and has been asked to share this information with PT colleagues during an in-service session. The therapist's BEST INITIAL activity is to:",a:"Survey colleagues about their current level of knowledge using a brief questionnaire"},
  {q:"A patient 3 months post-CVA is being treated for adhesive capsulitis of the right shoulder. Today the patient complains of new symptoms: constant burning pain in the right upper extremity increased by dependent position and touch, with mild edema and stiffness of the right hand. The intervention that is CONTRAINDICATED is:",a:"Passive manipulation and ROM of the shoulder"},
  {q:"To prepare a patient with an incomplete T12 paraplegia (ASIA A) for ambulation with crutches, the upper quadrant muscles MOST important to strengthen include the:",a:"Lower trapezius, latissimus dorsi, and triceps"},
  {q:"A patient recovering at home from an MI and percutaneous transluminal coronary angioplasty is monitored with pulse oximetry during exercise. An acceptable oxygen saturation rate (SpO₂) to maintain throughout the exercise period is:",a:"92%"},
  {q:"Following major surgery of the right hip, a patient ambulates with a Trendelenburg gait. Examination reveals abductor weakness (gluteus medius 3/5) and ROM limitations. The PT uses functional electrical stimulation to help improve the gait pattern. Stimulation should be initiated for the:",a:"Right abductors during stance on the right"},
  {q:"A patient referred for loss of cervical AROM has X-rays showing DJD at the uncinate processes in the cervical spine. The motion that would be MOST restricted would be:",a:"Side bending"},
  {q:"A patient is unable to perform overhead activities because of a painless inability to reach past 80° of right shoulder abduction, and the empty can test was positive. Early subacute physical therapy intervention should focus on:",a:"Active assistive pulley exercises"},
  {q:"Two PTs perform the FIM on the same group of patients. Results reveal differences in the two PTs' scores, but not in their repeat measurements. This is indicative of a problem in:",a:"Interrater reliability"},
  {q:"A patient recovering from complete C5 tetraplegia (ASIA A) complains of a sudden pounding headache and double vision during PROM exercises. The therapist notes excessive sweating and a BP of 240/95. The BEST course of action is to:",a:"Sit the patient up, check/empty the catheter bag, and then call for emergency medical assistance"},
  {q:"A child presents with a flatfoot deformity, abduction of the forefoot, and forefoot inverted to varus position when inspected from the frontal plane. Correct choices for orthotic management include:",a:"Thomas heel, UCBL insert, or scaphoid pad"},
  {q:"A child with full-thickness burns to both arms is developing hypertrophic scars. The BEST initial intervention to manage these scars is:",a:"Application of custom-made pressure garments"},
  {q:"A patient with COPD has developed respiratory acidosis. The PT instructs a student to monitor the patient closely for:",a:"Disorientation"},
  {q:"A computer programmer in her second trimester of pregnancy is referred for physical therapy with complaints of tingling and loss of strength in both hands, exacerbated by keyboard use for longer than 20 minutes. The MOST beneficial physical therapy intervention is:",a:"Placing the wrists in resting splints"},
  {q:"A PT is working in an elementary school with a child who demonstrates moderate to severe extensor spasticity and limited head control. The MOST beneficial positioning device is a:",a:"Wheelchair with a back wedge and head supports"},
  {q:"A patient with complete C6 tetraplegia (ASIA A) should be instructed to initially transfer with a sliding board using:",a:"Shoulder extensors, external rotators, and anterior deltoid to position and lock the elbow"},
  {q:"A PT is teaching a stroke education class on positioning techniques for family members and caregivers. At the conclusion of the class, caregivers will be expected to utilize the skills taught. The BEST teaching method is:",a:"Therapist demonstration, caregiver practice, and follow-up individual discussion"},
  {q:"A patient with active tuberculosis has been hospitalized and on appropriate antituberculin drugs for three weeks. During treatment, the therapist should observe what precautions?",a:"The patient can be treated in the PT gym without precautions"},
  {q:"A 12-year-old is referred for treatment of patellar tendinitis. The patient is unable to hop on the affected lower extremity because of pain and is sent for an x-ray. The therapist's initial intervention should focus on:",a:"Iontophoresis using dexamethasone and patient education regarding avoidance of squatting and jumping activities"},
  {q:"A patient with a history of low back pain has been receiving physical therapy for 12 weeks. He is employed as a loading dockworker performing repetitive lifting and carrying of boxes weighing 15-30 lbs. An appropriate engineering control to reduce the stresses of lifting and carrying would be to:",a:"Provide a two-wheel handcart for use in moving the boxes"},
  {q:"Common compensatory postures the PT would expect for a patient diagnosed with fixed severe forefoot varus are:",a:"Subtalar pronation and medial rotation of the tibia"},
  {q:"A patient has undergone surgery and subsequent immobilization to stabilize the olecranon process and now exhibits an elbow flexion contracture. An absolute CONTRAINDICATION for joint mobilization would be:",a:"Empty end-feel"},
  {q:"A middle-aged patient is recovering from surgical repair of an inguinal hernia and experiencing persistent discomfort in the groin area. Patient education should focus on:",a:"Proper lifting techniques and precautions against heavy lifting"},
  {q:"A researcher examined the effects of blocked versus random task practice order on motor skill learning in adults with Parkinson's Disease. The study recruited 20 adults with mild PD and 20 age-matched adults divided into four groups. Study limitations that compromise generalizability of the findings include:",a:"Small sample size and limited number of practice trials"},
  {q:"A patient has lumbar spinal stenosis encroaching on the spinal cord. The PT should educate the patient to AVOID:",a:"Swimming using a crawl stroke"},
  {q:"Researchers examined the benefits of strength training on functional performance in older adults. The data analysis involved a meta-analysis. This refers to:",a:"Pooling of data of RCTs to yield a larger sample"},
  {q:"A group of 100 patients who experienced low back pain from a work-related injury were identified and followed over a period of 1 year. Differential outcomes were recorded and factors were hypothesized that influenced the probability of a good outcome. This study is an example of a:",a:"Cohort study"},
  {q:"During the initial examination of a client with an ulcer superior to the medial malleolus, the PT notes hemosiderosis and liposclerosis. There are no signs of infection, minimal drainage, granulation is present, and the wound bed is clean except for a small amount of yellow fibrin deposits. The next action the therapist should take is:",a:"Perform an ankle-brachial index (ABI)"},
  {q:"An 11-year-old was referred to physical therapy with complaints of vague pain at his right hip and thigh that radiated to the knee. AROM is restricted in abduction, flexion, and internal rotation, and a gluteus medius gait was observed. The BEST choice for PT intervention is:",a:"Closed-chain partial weight-bearing lower extremity exercises for slipped capital femoral epiphysis"},
  {q:"A researcher states that he expects no significant difference between 20 and 30 year-olds after a 12-week exercise training program using exercise HRs and myocardial oxygen consumption as measures of performance. The kind of hypothesis being used in this study is a(n):",a:"Null hypothesis"},
  {q:"A PT placed a leg on two pillows for a patient in a shared room who asked for repositioning. Unknown to the therapist, this patient had a femoral artery graft 2 days prior. The graft became occluded and the patient sued for malpractice. The hospital administrator and legal team decided that:",a:"The therapist was functioning outside common hospital protocols and the hospital did not support the actions of the therapist"},
  {q:"A patient has a 3-year history of multiple sclerosis with persistent and severe diplopia, leaving the patient frequently nauseated and immobile. A beneficial intervention strategy to assist the patient in successfully participating in rehabilitation would be to:",a:"Patch one eye"},
  {q:"The BEST positioning strategy for a patient recovering from acute stroke who is in bed and demonstrates a flaccid upper extremity is:",a:"Side-lying on the sound side, with the affected shoulder protracted and the arm extended resting on a pillow"},
  {q:"A patient presents with a large plantar ulcer to be debrided. The foot is cold, pale, and edematous. The patient complains of dull aching, especially when the leg is in dependent position. The condition most likely resulting in this clinical presentation is:",a:"Chronic venous insufficiency"},
  {q:"A patient is referred for physical therapy following a femur fracture 6 months ago. The cast has been removed but the patient is unable to volitionally contract the quadriceps. The PT applies electrical stimulation to the quadriceps. The BEST choice of electrode size and placement is:",a:"Large electrodes, widely spaced"},
  {q:"While setting a patient up for cervical traction, the PT notices a mole that is brown and black with diffuse edges on the patient's neck. The therapist should:",a:"Continue with the traction and report the findings to the physician immediately post treatment"},
  {q:"A patient is recovering in the ICU after a severe traumatic brain injury and multiple fractures. On day 2, the patient is less alert with changing status. Signs and symptoms that would require emergency consultation with a physician include:",a:"Decreasing consciousness, with slowing of pulse and Cheyne-Stokes respirations"},
  {q:"A PT receives a referral for a patient with neuropraxia involving the ulnar nerve secondary to an elbow fracture. Based on knowledge of this condition, the therapist expects that:",a:"Nerve dysfunction will be rapidly reversed, generally in 2-3 weeks"},
  {q:"After 3 weeks of teaching a patient how to ambulate with bilateral crutches and a touch-down gait, the PT determines the most appropriate kind of feedback to give to the patient is:",a:"Occasional feedback, given when consistent error appears"},
  {q:"A home health PT is treating an elderly patient who presents confused, with shortness of breath and generalized weakness. Given a history of hypertension and hyperlipidemia, the therapist suspects the patient:",a:"May be presenting with early signs of MI"},
  {q:"A baseball pitcher is seen following surgical repair of a SLAP lesion of his pitching arm. The phase of the throwing motion that puts the greatest stress on the anterior labrum and capsule is:",a:"Cocking"},
  {q:"A patient is hospitalized in the ICU following a traumatic SCI resulting in C3 tetraplegia (ASIA A) and is receiving endotracheal suctioning following significant pulmonary congestion. The recommended time duration for endotracheal suctioning is:",a:"10-15 seconds"},
  {q:"A frail older adult confined to bed in a nursing facility has developed a small superficial wound over the sacral area. The physician has decided to use autolytic wound debridement because only small amounts of necrotic tissue are present. This is BEST achieved with:",a:"Transparent film dressing"},
  {q:"A patient states that the conventional (high-rate) TENS unit is no longer effective in reducing chronic low back pain despite increasing the intensity to maximum. The PT should advise the patient to:",a:"Switch to modulation mode TENS"},
  {q:"During initial standing, a patient with chronic stroke is pushing strongly backward, displacing the center-of-mass at or near the posterior limits of stability. The most likely cause of this is:",a:"Spasticity of the gastrocnemius-soleus"},
  {q:"A patient was screened using a new test for the presence of a gene linked to Alzheimer's disease and was told the gene was absent. Some years later the patient develops Alzheimer's and a repeat test reveals the presence of the gene. The results of the initial test can be interpreted as:",a:"False-negative test result"},
  {q:"A middle-aged adult has recently been diagnosed with multi-infarct dementia and is recovering from a fractured hip following a fall. In the initial interview with the patient's wife, the PT would expect to find:",a:"History of sudden onset of new cognitive problems and patchy distribution of deficits"},
  {q:"A 14-year-old girl complains of subpatellar pain after 2 weeks of an aerobic exercise program. Examination shows a large Q angle, pain with palpation at the inferior pole of the patella, and mild swelling at both knees. The BEST intervention is:",a:"Vastus medialis (VM) muscle strengthening"},
  {q:"A PT receives a referral to treat a patient with right hemiparesis at home. Both involved limbs are categorized as stage 4 (some movements out-of-synergy). The patient is ambulatory with a small-based quad cane. The activity MOST beneficial for this stage of recovery is:",a:"Standing, lifting the foot up behind and slowly lowering it"},
  {q:"An elderly woman with low back pain tells the PT she has had urinary incontinence for the last year, especially when she coughs. She has not told her physician because she is embarrassed. The therapist's BEST course of action is to:",a:"Examine the patient, document impairments and discuss findings with the physician"},
  {q:"During a sensory examination, a patient complains of dull aching pain and is unable to discriminate a stimulus as sharp or dull. Two-point discrimination is absent. Based on these findings, the pathway that is intact is the:",a:"Anterior spinothalamic tract"},
  {q:"A patient is 5 days post-MI and is referred for inpatient cardiac rehabilitation. Appropriate criteria for determining the initial intensity of exercise include:",a:"HR less than 129 beats/min and RPE less than 13"},
  {q:"A patient receiving immunosuppressants (cyclosporine) following renal transplantation is referred for mobility training with crutches. Initial examination reveals paresthesias in both lower extremities with peripheral weakness in both hands and feet. The therapist determines the patient is likely experiencing:",a:"Peripheral neuropathy"},
  {q:"A multicenter study was done on the reliability of passive wrist goniometric measurements using three alignment techniques. Significant differences were revealed between the three techniques. An appropriate level for determining significant difference is a P value of:",a:"P = .05"},
  {q:"In treating a patient with a diagnosis of right shoulder impingement syndrome, the FIRST intervention the PT should consider is to:",a:"Instruct the patient in proper postural alignment"},
  {q:"An elderly patient arrives for therapy complaining of pain and tingling in the forehead, cheek, and jaw on the left side. An inspection of the trunk reveals vesicles in the distribution of the T2 dermatome. The PT's BEST initial course of action is to:",a:"Refer the patient back to the primary physician immediately"},
  {q:"An elderly patient is referred following a recent compression fracture at T8. Medical history includes osteoporosis and GERD, and the patient is taking antacids. Which is MOST important for the therapist to consider in the POC?",a:"Schedule therapy sessions at least 90 minutes after eating"},
  {q:"A patient with spastic hemiplegia is having difficulty rising to standing due to co-contraction of the hamstrings and quadriceps. The therapist uses biofeedback as an adjunct. For knee extension, the biofeedback protocol should consist of:",a:"Low detection sensitivity, with electrodes placed close together"},
  {q:"A patient sustained a T10 SCI (ASIA C) 4 years ago and is now seen in outpatient PT. The PT observes redness over the ischial seat that persists for 10 minutes when not sitting. The BEST intervention is to:",a:"Reemphasize the need for sitting push-ups performed every 15 minutes"},
  {q:"An adolescent female is referred with a diagnosis of anterior knee pain. Positive findings include pes planus, lateral tibial torsion, and genu valgum. The position that the femur will be in is excessive:",a:"Medial rotation"},
  {q:"A patient is referred for vestibular rehabilitation presenting with spontaneous nystagmus suppressible with visual fixation, oscillopsia, loss of gaze stabilization, intense disequilibrium, and an ataxic wide-based gait with consistent veering to the left. The PT determines the patient is most likely exhibiting signs of:",a:"Acute unilateral vestibular dysfunction"},
  {q:"A PT is working with a 10-year-old with cerebral palsy whose POC involves using a therapy ball. The BEST choice of educational media when instructing in use of this device is:",a:"A DVD of another child with cerebral palsy on a therapy ball"},
  {q:"A sports PT is working with a high school football team. A player is tackled violently and is unresponsive with normal respirations. The immediate course of action should be to:",a:"Summon emergency medical services"},
  {q:"During a home visit, the mother of an 18-month-old child with developmental delay and an atrioventricular shunt for hydrocephalus tells the PT that her daughter vomited several times, was irritable, and is now lethargic. The therapist's BEST course of action is to:",a:"Call for emergency transportation and notify the pediatrician immediately"},
  {q:"A woman recently delivered twins and developed a 4-cm diastasis recti abdominis. The BEST initial intervention for this problem is to teach:",a:"Protection and splinting of the abdominal musculature"},
  {q:"The optimal position for ventilation of a patient with a C5 SCI (ASIA A) is:",a:"Supine, head of bed flat"},
  {q:"A 16-year-old patient with osteosarcoma is being seen in physical therapy for crutch training. The parents have decided not to tell their child about the diagnosis. The patient asks the PT directly if it is cancer. The therapist's BEST course of action is to:",a:"Schedule a conference with the physician and family about these questions"},
  {q:"A patient has a 2-year history of ALS and exhibits moderate functional deficits. The patient is still ambulatory with bilateral canes but is limited in endurance. An important goal for the PT plan of care should be to prevent:",a:"Overwork damage in weakened denervated muscle"},
  {q:"A patient has extensive full-thickness burns to the dorsum of the right hand and forearm and is being fitted with a resting splint. The splint should position the wrist and hand in:",a:"Slight wrist extension with fingers supported and thumb in partial opposition and abduction"},
  {q:"A patient is on the cardiac unit following admission for CHF and a history of an MI. The patient is currently compensated by pharmacological management and is comfortable, alert and oriented at rest with a normal HR and BP. The telemetric ECG depicts ST segment depression. The PT's appropriate interpretation and action is:",a:"ST segment depression: check medical record for baseline ECG"},
  {q:"A PT assigned to a weekly group of stroke caregivers wants to utilize concepts of adult learning during the sessions. Which of the following guidelines BEST demonstrates this?",a:"Participants assume an active role in determining the agenda"},
  {q:"An 18-month-old child with Down syndrome and moderate developmental delay is being treated at an Early Intervention Program. Daily training activities that should be considered include:",a:"Holding and weight shifting in sitting and standing using tactile and verbal cueing"},
  {q:"A patient is referred for acute shoulder pain after shoveling snow for 2 hours. Positive findings include pain and weakness with flexion of an extended upper extremity and scapular winging with greater than 90 degrees of abduction. The patient's problem is MOST LIKELY the result of:",a:"Compression of the long thoracic nerve"},
  {q:"A patient with MS demonstrates strong bilateral lower extremity extensor spasticity in the typical distribution of antigravity muscles. This patient would be expected to demonstrate:",a:"Sacral sitting with increased extension and adduction of lower extremities"},
  {q:"A patient with MS has been on prednisolone for the past 4 weeks, now being tapered off. This is the third time this year the patient has received this treatment for an MS exacerbation. The PT recognizes possible adverse effects of this medication are:",a:"Muscle wasting, weakness, and osteoporosis"},
  {q:"A 24-year-old woman who is 12 weeks pregnant asks a PT if it is safe to continue jogging 3 miles three times a week, which she has done for the past 10 years. The therapist's BEST answer is:",a:"Jogging is safe at mild to moderate intensities, whereas vigorous exercise is contraindicated"},
  {q:"A patient with a grade 2 quadriceps strain returns to physical therapy after the first exercise session complaining of muscle soreness that developed later in the evening. The therapist can minimize the possibility of this happening again by using:",a:"Concentric exercises, 3 sets of 10 with gradually increasing intensity"},
  {q:"Upon examining a patient with vague hip pain that radiates to the lateral knee, the PT finds a negative FABER test, negative grind test, and a positive Noble's compression test. The dysfunction is most likely due to:",a:"An iliotibial band friction disorder"},
  {q:"A patient suffered carbon monoxide poisoning from a work-related factory accident and is left with permanent damage to the basal ganglia. Intervention for this patient will need to address expected impairments of:",a:"Motor planning with the use of guided and cued movement"},
  {q:"A patient presents with problems swallowing. When the PT tests for phonation by having the patient say 'AH' with the mouth open, there is deviation of the uvula to one side. The therapist notices decreased response to stimulation of the gag reflex. These findings suggest involvement of the:",a:"Vagus nerve"},
  {q:"A patient with COPD is sitting in a bedside chair. The apices of the lungs in this position compared with other areas of the lungs would demonstrate:",a:"Increased volume of air at resting end-expiratory position (REEP)"},
  {q:"During a sagittal plane checkout of a hip-knee-ankle-foot orthosis (HKAFO), the PT determines that the orthotic hip joint is malaligned. The correct position is:",a:"Just anterior and superior to the greater trochanter"},
  {q:"A PTA supervising a patient's home exercise program takes the patient on stairs for the first time at 6 weeks post-stroke. The POC stated 'progressive gait training on level surfaces.' The patient falls and sustains a fractured hip. The responsible party in this case is:",a:"The PTA, who is completely liable because the POC was altered without communicating with the supervising PT"},
  {q:"As a result of blunt trauma to the quadriceps femoris muscle, a patient experiences loss of knee function. The BEST choice for early physical therapy intervention is:",a:"Gentle AROM exercises in weight-bearing"},
  {q:"A PT is teaching wheelchair skills to an adolescent with a recent SCI. The BEST motivational techniques to ensure full participation are to:",a:"Treat the patient as an adult and incorporate the patient's goals into the POC"},
  {q:"While evaluating the gait of a patient with right hemiplegia, the PT notes foot drop during midswing on the right. The MOST LIKELY cause of this deviation is:",a:"Inadequate contraction of the ankle dorsiflexors"},
  {q:"A patient's daughter wants to look at her father's medical record. He has recently been admitted for an insidious onset of low back pain. The PT should:",a:"Tell her that she must have the permission of her father before she can look at the chart"},
  {q:"Following a total knee replacement (TKR), continuous passive motion (CPM) is initiated. One of the main objectives in using CPM in this case is to facilitate:",a:"Active knee flexion"},
  {q:"The use of ultrasound (US) in the area of a joint arthroplasty is permissible, even if the surrounding area contains:",a:"Metal implants"},
  {q:"A PT observes genu recurvatum during ambulation in a patient with hemiplegia who has been using a posterior leaf spring orthosis for 4 weeks. The Fugl-Meyer lower extremity score is 22 of 34, with strong synergies and no out-of-synergy movement. The most likely cause of this deviation is:",a:"Extensor spasticity"},
  {q:"During a home visit, a PT providing postural drainage in the Trendelenburg position to an adolescent with cystic fibrosis. The patient suddenly complains of right-sided chest pain and shortness of breath, and there are no breath sounds on the right on auscultation. The therapist should:",a:"Call emergency medical services because it may be a pneumothorax"},
  {q:"A client with rheumatoid arthritis presents with severe whiplash from a motor vehicle accident 1 week ago. Cervical radiograph showed osseous structures intact. Chief complaints are cervical pain and sudden falls with loss of consciousness. Examination reveals a positive Romberg sign and hyperreflexia. The PT's INITIAL action is to:",a:"Fit the client with a hard cervical collar and contact the referring physician recommending a CT scan"},
  {q:"A patient with an 8-year history of PD demonstrates significant rigidity, decreased PROM in both upper extremities, and frequent episodes of akinesia. The exercise intervention that BEST deals with these problems is:",a:"PNF bilateral symmetrical upper extremity D2 flexion patterns, rhythmic initiation"},
  {q:"An elderly patient with diabetes is recovering from surgery to graft a large decubitus ulcer over the heel of the left foot. The PT is very busy and considers delegating ROM exercises to a new PT aide who is willing to learn. The therapist's BEST course of action is to:",a:"Perform the ROM exercises without delegating the task"},
  {q:"A PT is working with a client who fractured the left fibula 3 months ago and is still having pain with exercise. Based on the recent radiograph showing non-union, the prognosis for this client is:",a:"A bone stimulator or surgery will be required"},
  {q:"The problems associated with ankylosing spondylitis in its early stages can BEST be managed by the PT with:",a:"Postural education"},
  {q:"A patient is referred for rehabilitation after a middle cerebral artery stroke. Based on this diagnosis, a PT can expect the patient to present with:",a:"Contralateral hemiparesis and sensory deficits; the arm more involved than the leg"},
  {q:"A cardiac rehabilitation participant asks the PT to help interpret cholesterol findings: total cholesterol 220 mg/dL, HDL 24 mg/dL, and LDL 160 mg/dL. Analysis of these values reveals:",a:"The levels of LDL and total cholesterol are abnormally high and HDL is abnormally low"},
  {q:"A female PT is treating a football player with an ACL sprain. After a few visits, the football player asks her out to dinner. The therapist's response should be to:",a:"Thank him very much but refuse his invitation while he is receiving treatment as her patient"},
  {q:"A PT is performing the maximal cervical quadrant test to the right with a patient with right C5-6 facet syndrome. The patient would most likely complain of:",a:"Pain in the right cervical region"},
  {q:"A 62-year-old patient who developed polio at age 6 has recently had to start using crutches again after years of improved function. The PT suspects post-polio syndrome. The BEST INITIAL intervention based on current findings is to:",a:"Instruct in activity pacing and energy conservation techniques"},
  {q:"A patient diagnosed with lumbar spondylosis without discal herniation or bulging has a left L5 neural compression. The most likely structure compressing the nerve root is the:",a:"Ligamentum flavum"},
  {q:"During an exercise tolerance test (ETT), a patient demonstrates a poor reaction to increasing exercise intensity. An absolute indication for terminating this test is:",a:"Onset of moderate to severe angina"},
  {q:"A child sat down in spilled pool chemicals while under the care of a babysitter. When the diaper was later removed, chemical burns were present. The BEST terms to characterize this burn are:",a:"Full-thickness burn wound"},
  {q:"A patient with a T4 SCI is being measured for a wheelchair. In determining the correct seat height, the PT can use as a measure:",a:"Clearance between the floor and the foot plate of at least 2 inches"},
  {q:"A 6-year-old boy has a diagnosis of Duchenne's muscular dystrophy, with more than a third of lower extremity muscles graded less than 3/5. The child is still ambulatory with assistive devices for short distances. The MOST appropriate activity to include in his POC would be:",a:"Recreational physical activities such as swimming"},
  {q:"A PT works in a private outpatient clinic and sells custom-made orthotic shoe inserts to patients. This practice can be viewed as unethical if the:",a:"Need for the inserts is exaggerated"},
  {q:"A patient with a CVA demonstrates a locked-in state characterized by spastic quadriplegia and bulbar palsy. To facilitate communication with this patient, the PT should instruct the family to:",a:"Encourage use of eye movements to signal letters"},
  {q:"After performing an ergonomic examination of a computer programmer and workstation, the most appropriate recommendation for achieving ideal wrist and elbow positioning would be to:",a:"Maintain the keyboard in a position that allows a neutral wrist position"},
  {q:"A patient with congestive heart failure is on digitalis to improve myocardial contraction and is a new participant in a phase 2 outpatient cardiac rehabilitation program. The PT expects the effects of this medication to include:",a:"Depressed ST segment on ECG with QT and T wave changes"},
  {q:"A patient is being treated for secondary lymphedema of the right arm as a result of a radical mastectomy and radiation therapy. The resulting edema (stage 1) can BEST be managed in physical therapy by:",a:"Intermittent pneumatic compression, extremity elevation, and massage"},
  {q:"A PT has been treating a patient for chronic subluxation of the patella. The patient is now scheduled for a lateral release and asks the therapist to describe any potential complications of the surgery. The therapist's BEST response is to:",a:"Suggest that the patient speak with his/her surgeon"},
  {q:"A patient was referred for physical therapy after a right breast lumpectomy with axillary lymph node dissection. Scapular control is poor when upper extremity flexion or abduction is attempted. Early PT intervention should focus on:",a:"Gravity-assisted right upper extremity exercises to promote scapular control following damage to the long thoracic nerve"},
  {q:"A post-surgical patient is receiving postural drainage, percussion, and shaking to reduce pulmonary congestion. The PT assigned to the case could reduce the frequency of treatment if the:",a:"Amount of productive secretions decreases"},
  {q:"A patient with a kidney transplant 5 years ago presents with unsteady gait onset. Evaluation shows increased skin turgor around extremity joints, decreased proprioception (3/5 lower extremity, 4/5 upper extremity), and a Berg Balance Test score of 40. The MOST important action for the PT to take is:",a:"Referral for follow-up to both physicians"},
  {q:"A PT arrives 1 hour before the work day commences and sustains a low back injury while moving treatment tables and rearranging the clinic. Payment for the therapist's care relating to this incident would be covered primarily by:",a:"Workers' Compensation"},
  {q:"A patient diagnosed with Paget's disease typically has symptomatology similar to that of spinal stenosis. The MOST important aspect of physical therapy intervention is:",a:"Postural re-education to prevent positions that increase symptoms"},
  {q:"A patient with spastic left hemiplegia experiences severe genu recurvatum during stance phase and is using a double upright metal AFO. The cause of the problem might be attributed to the:",a:"Anterior stop setting the foot in too much plantarflexion"},
  {q:"A patient complains of difficulty walking. At rest, the skin in the lower leg appears discoloured. After walking for about 2 minutes, the patient complains of pain in the leg with marked pallor evident in the skin over the lower third of the extremity. The PT suspects:",a:"Vascular claudication"},
  {q:"A physical therapy plan of care for a child with spastic cerebral palsy who is 3 years old chronologically and cognitively but at a 6-month gross developmental level would include:",a:"Reaching for a multicolored object while in an unsupported, guarded sitting position"},
  {q:"A patient is receiving mobilizations to regain normal mid thoracic extension. After three sessions, the patient complains of localized pain that persists for greater than 24 hours. The therapist's treatment should:",a:"Change mobilizations to gentle, low-amplitude oscillations to reduce the joint and soft tissue irritation"},
  {q:"A therapist wishes to use behavior modification techniques as part of a plan of care to help shape the behavioral responses of a patient recovering from TBI. The BEST form of intervention is to:",a:"Use frequent reinforcements for all desired behaviors"},
  {q:"A patient with multiple sclerosis presents with dysmetria in both upper extremities. Which of the following interventions is the BEST choice to deal with this problem?",a:"PNF patterns using dynamic reversals with carefully graded resistance"},
  {q:"A patient suffered recent fractures of C4 and C5 following trauma received in a motor vehicle accident. Maximum stabilization of his cervical spine can BEST be achieved with a:",a:"Halo orthosis"},
  {q:"A patient recovering from cardiac transplantation for end-stage heart failure is referred for exercise training and is receiving immunosuppressive drug therapy. The therapist recognizes that this patient will:",a:"Require longer periods of warm-up and cool-down"},
  {q:"A patient presents with weakness and atrophy of the biceps brachii resulting from an open fracture of the humerus. During needle EMG of the biceps, the muscle response anticipated after the needle is inserted and prior to asking the patient to contract the muscle is:",a:"Electrical silence"},
  {q:"A new staff PT on the oncology unit receives a referral for strengthening and ambulation for a woman with ovarian cancer undergoing radiation therapy after a surgical hysterectomy. Her current platelet count is 17,000. The treatment of GREATEST BENEFIT for this patient at this time is:",a:"Active range of motion (AROM) exercises"},
  {q:"A patient complains of increased pain and tingling in both hands after sitting at a desk longer than 1 hour. The diagnosis is thoracic outlet syndrome (TOS). Which treatment would be the MOST effective physical therapy intervention?",a:"Stretching program for the pectoralis minor and scalenes"},
  {q:"A patient with diabetes reports feeling weak, dizzy, and somewhat nauseous during exercise. The therapist notices the patient is sweating profusely and is unsteady when standing. The therapist's BEST immediate course of action is to:",a:"Administer orange juice for developing hypoglycemia"},
  {q:"A patient with post-polio syndrome started attending a supervised outpatient exercise program but failed to show up for follow-up sessions, reporting increased muscle pain and being too weak to get out of bed for 2 days. The therapist's BEST course of action regarding exercise is to:",a:"Decrease the intensity and duration, but maintain a frequency of 3 times per week"},
  {q:"A physical therapy student on a final clinical rotation tends to process information all at once, not in an ordered step-by-step manner. The supervising therapist's BEST strategy to ensure adequate learning for this student is to:",a:"Provide real-life examples that link learning to personal experiences"},
  {q:"A patient is recovering from open heart surgery (CABG). The PT supervising the patient's outpatient exercise program at 8 weeks post-surgery recognizes that resistance training with moderate to heavy weights:",a:"Should be avoided during the first 3 months"},
  {q:"A patient is taking albuterol (Ventolin) from the sympathomimetic drug group. What is the MOST important effect of this medication?",a:"Reduces airway resistance by reducing bronchospasm"},
  {q:"A PT decides to exercise a patient with lower extremity lymphedema using aquatic therapy. Hydrostatic pressure exerted by the water can be expected to:",a:"Reduce effusion and assist venous return"},
  {q:"A therapist determines that a patient is walking with a backward trunk lean with full weight bearing on the right leg and demonstrates great difficulty going up ramps. The BEST intervention to remediate this problem is to:",a:"Strengthen hip extensors through bridging"},
  {q:"If a patient has developed a thick eschar secondary to a full-thickness burn, the antibacterial agent MOST effective for infection control is:",a:"Sulfamylon"},
  {q:"An elderly person has lost significant functional vision over 4 years, complains of blurred vision and difficulty reading, frequently mistakes images directly in front especially in bright light, but can locate items to both sides using peripheral vision. The therapist suspects:",a:"Cataracts"},
  {q:"A therapist publishes a study of a 5-year-old with C4 SCI (ASIA C) from a motor vehicle accident who participated in a locomotor training program using a body weight support system. After training, outcomes included return to walking in the community with assistive devices. This is an example of a:",a:"Case report"},
  {q:"A patient incurred a right CVA 1 month ago and demonstrates moderate spasticity in the left upper extremity with predominantly increased flexor tone. There is minimal active movement with a quarter-inch subluxation of the shoulder. The initial treatment activity of GREATEST BENEFIT is:",a:"Sitting, weight-bearing on extended left upper extremity, weight-shifting"},
  {q:"A therapist conducts a study of the effectiveness of heat and cold in treating patients with pain. Group A (heat) has a mean score of 33 with a standard deviation of 1, whereas Group B (cold) has a mean of 35 with a standard deviation of 6. The conclusion one should reach is:",a:"The spread of scores with cold treatment demonstrates that variability is greater"},
  {q:"A patient presents with pain and instability of the left foot/ankle secondary to poliomyelitis with more recent development of progressive post-polio muscle atrophy. In this case, a plastic solid ankle-foot orthosis (AFO) is an appropriate prescription in order to:",a:"Restrict all movement"},
  {q:"A patient is referred to physical therapy after an anteroinferior dislocation of the right shoulder. A possible positive examination finding as a result of this trauma would be:",a:"Weak deltoids"},
  {q:"A team of researchers investigates the use of constraint-induced movement therapy on patients with chronic stroke using a multicenter randomized controlled trial (RCT). This type of design provides the highest level of evidence because it uses:",a:"Random assignment to an experimental or control group"},
  {q:"A therapist has been asked to give an in-service presentation to staff nurses on safeguarding techniques. In order to best prepare for this talk, the therapist should:",a:"Provide a questionnaire to all participants 2 weeks before the scheduled session"},
  {q:"The patient with left hemiplegia would be LEAST likely to respond in therapy if the motor learning strategies emphasized:",a:"Maximum use of demonstration and gesture"},
  {q:"A 2-week-old infant born at 27 weeks gestation with hyaline membrane disease is referred for a physical therapy consult. Nursing reports the child desaturates to 84% with handling and has minimal secretions. The PT should:",a:"Provide suggestions to nursing for positioning for optimal motor development"},
  {q:"A patient sustained a valgus stress to the left knee while skiing. The orthopedist found a positive McMurray's test and a positive Lachman's stress test. The BEST intervention for the subacute phase of physical therapy is:",a:"Closed-chain functional strengthening of the quadriceps femoris and hamstrings, emphasizing regaining terminal knee extension"},
  {q:"A patient's chief complaint is increasing difficulty completing ADLs and IADLs. The chart review reveals chronic immunosuppression due to a kidney transplant 20 years ago with no other remarkable medical history. The PT hypothesizes that the impairments MOST involved in limiting function are likely related to:",a:"Loss of muscle strength"},
  {q:"A patient with TBI has a convulsive seizure during a therapy session. The patient has lost consciousness and presents with tonic-clonic convulsions of all extremities. The therapist's BEST response is to:",a:"Position in side-lying, check for an open airway, and immediately call for emergency assistance"},
  {q:"A therapist wants to know whether NDT handling techniques produce an improvement in independent rolling that lasts longer than 30 minutes. In this study, rolling is the:",a:"Dependent variable"},
  {q:"An adult with no significant past medical history presents to the emergency room with fever, shaking chills, worsening productive cough, and chest pain over the posterior base of the left thorax made worse on inspiration. An expected physical finding for this patient would be:",a:"Crackles over the left thorax"},
  {q:"A patient with post-polio syndrome is demonstrating severe genu valgum during standing and walking. This problem can be effectively controlled by prescribing a KAFO with:",a:"A posterior plastic shell"},
  {q:"An elderly patient confined to bed after a severe stroke has a 25-year history of diabetes and diabetic neuropathy. The therapist identifies ischemic necrosis on the lateral side of the right foot and finds the patient is unable to sense a 5.07 Semmes-Weinstein monofilament in the right forefoot. The therapist's interpretation is that:",a:"Protective sensation of the foot is lost at the 10-g force level"},
  {q:"A patient strained the lower back muscles 3 weeks ago and now complains of pain 6/10 with bilateral muscle spasm from T10-L4. The therapist elects to apply interferential current. The BEST electrode configuration to choose in this case would be:",a:"Four electrodes, with current flow diagonal to the spinal column"},
  {q:"An infant is independent in sitting including all protective extension reactions, can pull-to-stand through kneeling, cruise sideways, and stand alone, but still demonstrates plantar grasp in standing. This infant's chronological age is approximately:",a:"8-9 months"},
  {q:"A retired bus driver has experienced increasing low back pain over 10 years. NSAIDs help relieve symptoms but there is always a nagging-type pain. Significant morning stiffness dissipates by noon with exercise. Pain is exacerbated with lifting, bending, and prolonged sitting. Physical therapy intervention should emphasize:",a:"Postural reeducation, soft tissue mobilization, and dynamic stabilization"},
  {q:"A therapist is orienting a new physical therapy aide in transfer techniques. The initial consideration would be to:",a:"Ask about previous work and other experiences related to transferring individuals"},
  {q:"An elderly patient with diabetes and bilateral lower extremity amputation is to be discharged from an acute care hospital 2 weeks post-surgery. The incisions are not healed and continue to drain. The patient is unable to transfer and has limited endurance out of bed. The BEST choice of discharge destination is:",a:"Skilled nursing facility"},
  {q:"A patient currently being seen for low back pain awoke with drooping left facial muscles and excessive drooling after recovering from a cold with a left earache. The therapist suspects Bell's palsy, which can be confirmed by examining:",a:"Sensation over the anterior tongue, and having the patient raise the eyebrows and puff the cheeks"},
  {q:"A PTA is assigned to ambulate a patient with a 10-year history of Parkinson's disease. The PT instructs the PTA to watch for:",a:"Decreased trunk rotation with shorter steps"},
  {q:"A patient with congestive heart failure is on diuretics (chlorothiazide). The potential side effects of this medication that the PT should be alert for include:",a:"Orthostatic hypotension and dizziness"},
  {q:"A patient with a traumatic injury to the right hand had a flexor tendon repair to the fingers. Physical therapy intervention after this type of repair would begin:",a:"Within a few days after surgery, to preserve tendon gliding"},
  {q:"A community-dwelling elder fell at home and suffered a Colles' fracture of the right wrist and humeral fracture of the right shoulder. The patient is hospitalized for ORIF of the right radius. An expected finding with this elderly patient compared with a younger patient is:",a:"Slower fracture healing time with prolonged rehabilitation"},
  {q:"The therapist suspects that a patient recovering from a middle cerebral artery stroke is exhibiting a pure hemianopsia. This can be examined using a:",a:"Visual confrontation test with a moving finger"},
  {q:"A patient recovering from a left tibial amputation complains of numbness and tingling affecting the dorsal foot and big toe. The therapist suspects the source of discomfort is most likely pressure from the residual limb wrapping affecting the:",a:"Common peroneal (fibular) nerve"},
  {q:"A therapist investigated the accuracy of pulse oximeter estimates during exercise and found arterial oxyhemoglobin saturation levels to have a correlation of 0.89 at high saturation but only 0.68 at low saturation levels. The results of this study suggest:",a:"Accuracy of the measurements increases at higher saturation levels"},
